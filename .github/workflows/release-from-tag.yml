name: Create Release From Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (example: @devsam7t3/react-step-form@0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
